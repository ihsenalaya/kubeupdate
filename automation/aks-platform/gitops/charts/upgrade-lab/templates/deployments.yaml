{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "upgrade-lab.fullname" $ }}-{{ $name }}
  labels:
    {{- include "upgrade-lab.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "upgrade-lab.name" $ }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "upgrade-lab.name" $ }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $name }}
        app.kubernetes.io/part-of: upgrade-lab
    spec:
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $name }}
          image: {{ include "upgrade-lab.image" (dict "root" $ "image" $svc.image) | quote }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: {{ ternary "/actuator/health/readiness" "/readyz" (eq $name "orders") }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            {{- if eq $name "edge" }}
            - name: PORT
              value: "{{ $svc.port }}"
            - name: CATALOG_URL
              value: http://{{ include "upgrade-lab.fullname" $ }}-catalog:{{ $.Values.services.catalog.port }}
            - name: ORDERS_URL
              value: http://{{ include "upgrade-lab.fullname" $ }}-orders:{{ $.Values.services.orders.port }}
            - name: SIGNALS_URL
              value: http://{{ include "upgrade-lab.fullname" $ }}-signals:{{ $.Values.services.signals.port }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: REDIS_URL
            - name: CLIENT_CERT_PATH
              value: /etc/lab-certs/client-certificate.pfx
            {{- else if eq $name "catalog" }}
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: POSTGRES_DSN
            {{- else if eq $name "orders" }}
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: SPRING_DATASOURCE_PASSWORD
            {{- else if eq $name "signals" }}
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.externalSecrets.targetSecretName }}
                  key: MONGO_URI
            {{- end }}
          {{- if eq $name "edge" }}
          volumeMounts:
            - name: lab-certificate
              mountPath: /etc/lab-certs
              readOnly: true
          {{- end }}
      {{- if eq $name "edge" }}
      volumes:
        - name: lab-certificate
          secret:
            secretName: {{ $.Values.externalSecrets.targetSecretName }}
            items:
              - key: client-certificate.pfx
                path: client-certificate.pfx
      {{- end }}
{{- end }}
