apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-api
  namespace: kug-real-workloads
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-api
  namespace: kug-real-workloads
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
