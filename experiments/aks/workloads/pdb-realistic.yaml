  template:
    metadata:
      labels:
        app: catalog-api
        app.kubernetes.io/part-of: kug-real-workloads
    spec:
      containers:
        - name: api
          image: busybox:1.36.1
          command: ["/bin/sh", "-c", "sleep 365d"]
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "true"]
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalog-api
  namespace: kug-real-workloads
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: catalog-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-api
  namespace: kug-real-workloads
  labels:
    app: worker-api
    app.kubernetes.io/part-of: kug-real-workloads
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-api
  template:
    metadata:
      labels:
        app: worker-api
        app.kubernetes.io/part-of: kug-real-workloads
    spec:
      containers:
        - name: worker
          image: busybox:1.36.1
          command: ["/bin/sh", "-c", "sleep 365d"]
          readinessProbe:
