apiVersion: v1
kind: Namespace
metadata:
  name: r10-with-readiness
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: with-readiness
  namespace: r10-with-readiness
spec:
  replicas: 2
  selector:
    matchLabels:
      app: with-readiness
  template:
    metadata:
      labels:
        app: with-readiness
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
