apiVersion: v1
kind: Namespace
metadata:
  name: r10-no-readiness
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-readiness
  namespace: r10-no-readiness
spec:
  replicas: 2
  selector:
    matchLabels:
      app: no-readiness
  template:
    metadata:
      labels:
        app: no-readiness
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
