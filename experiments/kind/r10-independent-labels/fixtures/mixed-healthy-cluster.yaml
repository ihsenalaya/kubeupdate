apiVersion: v1
kind: Namespace
metadata:
  name: r10-healthy
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-api
  namespace: r10-healthy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: healthy-api
  template:
    metadata:
      labels:
        app: healthy-api
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: healthy-api
  namespace: r10-healthy
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: healthy-api
