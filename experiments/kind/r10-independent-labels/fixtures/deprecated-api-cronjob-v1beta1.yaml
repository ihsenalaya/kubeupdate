apiVersion: batch/v1beta1
kind: CronJob
metadata:
  name: legacy-cronjob
  namespace: default
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: job
              image: registry.k8s.io/pause:3.9
