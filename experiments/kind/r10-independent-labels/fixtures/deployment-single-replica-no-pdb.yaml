apiVersion: v1
kind: Namespace
metadata:
  name: r10-singleton-no-pdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: singleton-api
  namespace: r10-singleton-no-pdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: singleton-api
  template:
    metadata:
      labels:
        app: singleton-api
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
