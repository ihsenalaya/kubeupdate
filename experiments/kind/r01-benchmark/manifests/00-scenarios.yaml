---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: r01-risky-webhook
webhooks:
  - name: policy.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: r01-admission-target
        name: missing-webhook
        path: /validate
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["UPDATE"]
        resources: ["configmaps"]
        scope: Namespaced
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-target
  namespace: r01-deprecated-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legacy-target
  template:
    metadata:
      labels:
        app: legacy-target
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
---
apiVersion: policy/v1beta1
kind: PodDisruptionBudget
metadata:
  name: legacy-pdb
  namespace: r01-deprecated-api
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: legacy-target
---
apiVersion: batch/v1beta1
kind: CronJob
metadata:
  name: legacy-cron
  namespace: r01-deprecated-api
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: job
              image: registry.k8s.io/pause:3.9
---
apiVersion: autoscaling/v2beta2
kind: HorizontalPodAutoscaler
metadata:
  name: legacy-hpa
  namespace: r01-deprecated-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legacy-target
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
