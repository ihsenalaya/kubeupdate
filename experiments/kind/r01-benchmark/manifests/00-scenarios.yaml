apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: r01-low-replicas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: r01-missing-readiness
spec:
  replicas: 2
  selector:
