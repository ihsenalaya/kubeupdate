            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: checkout-api
  namespace: r01-missing-readiness
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: checkout-api
