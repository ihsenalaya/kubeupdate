apiVersion: upgrade.guardian.io/v1alpha1
kind: UpgradeAssessment
metadata:
  name: r01-assessment
  namespace: r01-system
spec:
  targetVersion: "1.32"
  mode: ReadOnly
  scope:
    namespaces:
      include:
        - r01-low-replicas
        - r01-missing-readiness
        - r01-pdb-min-blocking
        - r01-pdb-max-zero
        - r01-pdb-no-match
        - r01-pdb-missing
        - r01-standalone-pod
        - r01-policy-restricted
        - r01-policy-missing-sc
        - r01-deprecated-api
        - r01-safe
      exclude:
        - kube-system
  checks:
    deprecatedApis: true
    workloadAvailability: true
    pdb: true
    readinessProbes: true
    admissionWebhooks: true
    policyRisks: true
    capacity: false
    observability: false
