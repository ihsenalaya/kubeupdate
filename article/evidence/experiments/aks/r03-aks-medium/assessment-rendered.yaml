apiVersion: upgrade.guardian.io/v1alpha1
kind: UpgradeAssessment
metadata:
  name: r03-aks-medium-assessment
  namespace: kug-assessment
spec:
  targetVersion: "1.35"
  mode: ReadOnly
  scope:
    namespaces:
      include:
        - ingress-nginx
        - cert-manager
        - monitoring
        - kug-real-workloads
      exclude:
        - kube-system
  checks:
    deprecatedApis: true
    workloadAvailability: true
    pdb: true
    readinessProbes: true
    admissionWebhooks: true
    policyRisks: true
    capacity: true
    observability: true
