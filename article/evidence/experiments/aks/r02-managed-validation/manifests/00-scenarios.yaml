apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: aksv-low-replicas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
