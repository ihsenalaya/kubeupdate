apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostpath-worker
  namespace: aksv-policy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hostpath-worker
  template:
    metadata:
      labels:
        app: hostpath-worker
    spec:
      volumes:
        - name: host-data
          hostPath:
            path: /tmp
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          volumeMounts:
            - name: host-data
              mountPath: /host
          readinessProbe:
            exec:
              command: ["true"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: true
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hostpath-worker
