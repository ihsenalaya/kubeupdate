apiVersion: v1
kind: Service
metadata:
  name: available-webhook
  namespace: aksv-admission
spec:
  ports:
    - name: https
      port: 443
      targetPort: 9443
  selector:
    app: available-webhook
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: r02-risky-webhook
webhooks:
  - name: policy.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: aksv-admission
        name: missing-webhook
        path: /validate
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["UPDATE"]
        resources: ["configmaps"]
        scope: Namespaced
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: r02-mutating-fail-webhook
webhooks:
  - name: mutate.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    namespaceSelector:
      matchLabels:
        webhook-scope: selected
    clientConfig:
      service:
        namespace: aksv-admission
        name: available-webhook
        path: /mutate
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["deployments"]
        scope: Namespaced
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: r02-safe-webhook
webhooks:
  - name: safe.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    namespaceSelector:
      matchLabels:
        webhook-scope: selected
    objectSelector:
      matchLabels:
        app: profile-api
    clientConfig:
      service:
        namespace: aksv-admission
        name: available-webhook
        path: /validate
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["UPDATE"]
        resources: ["deployments"]
        scope: Namespaced
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modern-hpa-target
  namespace: aksv-modern-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: modern-hpa-target
  template:
    metadata:
      labels:
        app: modern-hpa-target
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
          resources:
            requests:
              cpu: 10m
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: modern-hpa-target
  namespace: aksv-modern-api
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: modern-hpa-target
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: modern-hpa
  namespace: aksv-modern-api
spec:
  minReplicas: 2
  maxReplicas: 4
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: modern-hpa-target
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: apps/v1
