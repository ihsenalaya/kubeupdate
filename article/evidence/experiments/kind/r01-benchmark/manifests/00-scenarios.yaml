  namespace: r01-deprecated-api
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: legacy-target
---
apiVersion: batch/v1beta1
kind: CronJob
metadata:
  name: legacy-cron
  namespace: r01-deprecated-api
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: job
              image: registry.k8s.io/pause:3.9
---
apiVersion: autoscaling/v2beta2
kind: HorizontalPodAutoscaler
metadata:
  name: legacy-hpa
  namespace: r01-deprecated-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legacy-target
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: legacy-psp
spec:
  privileged: false
  allowPrivilegeEscalation: false
  runAsUser:
    rule: RunAsAny
  seLinux:
    rule: RunAsAny
  supplementalGroups:
    rule: RunAsAny
  fsGroup:
    rule: RunAsAny
  volumes:
    - configMap
    - emptyDir
    - secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modern-hpa-target
