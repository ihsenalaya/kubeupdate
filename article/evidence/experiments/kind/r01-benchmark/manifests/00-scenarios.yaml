apiVersion: v1
kind: Service
metadata:
  name: available-webhook
  namespace: r01-admission-target
spec:
  ports:
    - name: https
      port: 443
      targetPort: 9443
  selector:
    app: available-webhook
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: r01-risky-webhook
webhooks:
  - name: policy.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: r01-admission-target
        name: missing-webhook
        path: /validate
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["UPDATE"]
        resources: ["configmaps"]
        scope: Namespaced
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: r01-mutating-fail-webhook
webhooks:
  - name: mutate.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    namespaceSelector:
      matchLabels:
        webhook-scope: selected
    clientConfig:
      service:
        namespace: r01-admission-target
        name: available-webhook
        path: /mutate
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["deployments"]
        scope: Namespaced
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: r01-safe-webhook
webhooks:
  - name: safe.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    namespaceSelector:
      matchLabels:
        webhook-scope: selected
    objectSelector:
      matchLabels:
        app: profile-api
    clientConfig:
      service:
        namespace: r01-admission-target
        name: available-webhook
        path: /validate
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["UPDATE"]
        resources: ["deployments"]
        scope: Namespaced
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-target
  namespace: r01-deprecated-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legacy-target
  template:
    metadata:
      labels:
        app: legacy-target
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
---
