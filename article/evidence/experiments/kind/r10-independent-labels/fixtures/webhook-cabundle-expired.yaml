apiVersion: v1
kind: Namespace
metadata:
  name: r10-webhook-cabundle
---
apiVersion: v1
kind: Service
metadata:
  name: webhook
  namespace: r10-webhook-cabundle
spec:
  ports:
    - name: https
      port: 443
      targetPort: 9443
  selector:
    app: webhook
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: r10-webhook-empty-cabundle
webhooks:
  - name: cabundle.r10.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      caBundle: ""
      service:
        namespace: r10-webhook-cabundle
        name: webhook
        path: /validate
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
