apiVersion: v1
kind: Namespace
metadata:
  name: r10-hpa-pdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaled-api
  namespace: r10-hpa-pdb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoscaled-api
  template:
    metadata:
      labels:
        app: autoscaled-api
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: autoscaled-api
  namespace: r10-hpa-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: autoscaled-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autoscaled-api
  namespace: r10-hpa-pdb
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autoscaled-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
