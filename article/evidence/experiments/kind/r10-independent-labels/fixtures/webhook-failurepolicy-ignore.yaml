apiVersion: v1
kind: Namespace
metadata:
  name: r10-webhook-ignore
---
apiVersion: v1
kind: Service
metadata:
  name: webhook
  namespace: r10-webhook-ignore
spec:
  ports:
    - name: https
      port: 443
      targetPort: 9443
  selector:
    app: webhook
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: r10-webhook-ignore
webhooks:
  - name: ignore.r10.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    namespaceSelector:
      matchLabels:
        r10-webhook: selected
    clientConfig:
      service:
        namespace: r10-webhook-ignore
        name: webhook
        path: /validate
    rules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["deployments"]
