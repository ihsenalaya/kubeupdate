apiVersion: v1
kind: Namespace
metadata:
  name: r10-capacity
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: packed-api
  namespace: r10-capacity
spec:
  replicas: 3
  selector:
    matchLabels:
      app: packed-api
  template:
    metadata:
      labels:
        app: packed-api
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
          resources:
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 2Gi
