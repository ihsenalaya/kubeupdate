apiVersion: v1
kind: Namespace
metadata:
  name: r10-safe-deployment
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safe-api
  namespace: r10-safe-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safe-api
  template:
    metadata:
      labels:
        app: safe-api
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
          readinessProbe:
            exec:
              command: ["true"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: safe-api
  namespace: r10-safe-deployment
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: safe-api
