apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeupgrade-guardian-operator.fullname" . }}
  labels:
    {{- include "kubeupgrade-guardian-operator.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kubeupgrade-guardian-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
