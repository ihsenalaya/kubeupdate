name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  image-and-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.0-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/kubeupgrade-guardian-operator" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            -t "${{ steps.meta.outputs.image }}:main" \
            .
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          docker push "${{ steps.meta.outputs.image }}:main"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Package and push chart
        run: |
          helm dependency update charts/kubeupgrade-guardian-operator
          helm package charts/kubeupgrade-guardian-operator \
            --version "${{ steps.meta.outputs.version }}" \
            --app-version "${{ steps.meta.outputs.version }}" \
            --destination dist
          helm push "dist/kubeupgrade-guardian-operator-${{ steps.meta.outputs.version }}.tgz" \
            "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts"
