apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeupgrade-guardian-operator.fullname" . }}
  labels:
    {{- include "kubeupgrade-guardian-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["upgrade.guardian.io"]
    resources: ["upgradeassessments"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["upgrade.guardian.io"]
    resources: ["upgradeassessments/finalizers"]
    verbs: ["update"]
  - apiGroups: ["upgrade.guardian.io"]
    resources: ["upgradeassessments/status", "upgradeplans/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["upgrade.guardian.io"]
    resources: ["upgradeplans"]
    verbs: ["create", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeupgrade-guardian-operator.fullname" . }}
  labels:
    {{- include "kubeupgrade-guardian-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeupgrade-guardian-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeupgrade-guardian-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
