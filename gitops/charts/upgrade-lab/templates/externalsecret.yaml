{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  labels:
    {{- include "upgrade-lab.labels" . | nindent 4 }}
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: POSTGRES_DSN
      remoteRef:
        key: {{ .Values.externalSecrets.keys.postgresDsn }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.keys.sqlServerJdbcUrl }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: {{ .Values.externalSecrets.keys.sqlServerUsername }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.keys.sqlServerPassword }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.externalSecrets.keys.redisUrl }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: MONGO_URI
      remoteRef:
        key: {{ .Values.externalSecrets.keys.cosmosMongoUri }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: client-certificate.pfx
      remoteRef:
        key: {{ .Values.externalSecrets.keys.clientCertificate }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
