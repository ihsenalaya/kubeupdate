"apiVersion": "argoproj.io/v1alpha1"
"kind": "Application"
"metadata":
  "annotations":
    "argocd.argoproj.io/sync-wave": "0"
  "finalizers":
  - "resources-finalizer.argocd.argoproj.io"
  "name": "opentelemetry-collector"
  "namespace": "argocd"
"spec":
  "destination":
    "namespace": "tracing"
    "server": "https://kubernetes.default.svc"
  "project": "platform"
  "source":
    "chart": "opentelemetry-collector"
    "helm":
      "releaseName": "opentelemetry-collector"
      "values": |
        "config":
          "exporters":
            "debug": {}
            "otlp/jaeger":
              "endpoint": "jaeger.tracing.svc.cluster.local:4317"
              "tls":
                "insecure": true
          "processors":
            "batch": {}
            "memory_limiter":
              "check_interval": "5s"
              "limit_percentage": 80
              "spike_limit_percentage": 25
          "receivers":
            "otlp":
              "protocols":
                "grpc":
                  "endpoint": "0.0.0.0:4317"
                "http":
                  "endpoint": "0.0.0.0:4318"
          "service":
            "pipelines":
              "traces":
                "exporters":
                - "otlp/jaeger"
                "processors":
                - "memory_limiter"
                - "batch"
                "receivers":
                - "otlp"
        "image":
          "repository": "otel/opentelemetry-collector-contrib"
        "mode": "deployment"
        "ports":
          "otlp":
            "containerPort": 4317
            "enabled": true
            "protocol": "TCP"
            "servicePort": 4317
          "otlp-http":
            "containerPort": 4318
            "enabled": true
            "protocol": "TCP"
            "servicePort": 4318
        "replicaCount": 1
    "repoURL": "https://open-telemetry.github.io/opentelemetry-helm-charts"
    "targetRevision": "0.158.1"
  "syncPolicy":
    "automated":
      "prune": true
      "selfHeal": true
    "syncOptions":
    - "CreateNamespace=true"
    - "ServerSideApply=true"
    - "RespectIgnoreDifferences=true"

