            "certificate":
              "secret": "neuvector-internal"
        "internal":
          "autoGenerateCert": false
          "autoRotateCert": false
          "certmanager":
            "enabled": true
            "secretname": "neuvector-internal"
        "manager":
          "env":
            "ssl": false
          "svc":
            "type": "ClusterIP"
